name: 'Deploy Speech-to-Text Stack to Amazon ECS'
on:
  workflow_dispatch:
    inputs:
      environment:
        description: HRM environment to deploy.
        default: development
        required: true
        type: choice
        options:
          - development
          - staging
          - production

      region:
        description: AWS region to deploy.
        default: us-east-1
        required: true
        type: choice
        options:
          - us-east-1
          - eu-west-1
          - ca-central-1

  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
    inputs:
      environment:
        description: HRM environment to deploy. E.G = development, staging, production (must match with the AWS environment value). Default value = development
        type: string
        default: development
        required: true
      region:
        description: AWS region to deploy. E.G = us-east-1, eu-west-1, ca-central-1. Default value = us-east-1
        type: string
        default: us-east-1
        required: true
      send-slack-message:
        description: 'Specifies if should send a Slack message at the end of successful run. Defaults to true'
        required: false
        default: 'true'
        type: string

env:
  ECR_REPOSITORY_PROXY: ${{ inputs.environment }}/speech-to-text-proxy-service
  ECR_REPOSITORY_PYANNOTE: ${{ inputs.environment }}/speech-to-text-pyannote
  ECR_REPOSITORY_LIMINA: ${{ inputs.environment }}/speech-to-text-limina
  # if anything is set as a secret, it can't be used in outputs. So we need to set it as an env var
  AWS_REGION: ${{ inputs.region }}
  PRIMARY_AWS_REGION: us-east-1

jobs:
  deploy_docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      proxy_image: ${{ steps.generate-output.outputs.proxy_image }}
      pyannote_image: ${{ steps.generate-output.outputs.pyannote_image }}
      limina_image: ${{ steps.generate-output.outputs.limina_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # this plugin sets the AWS account ID to a secret which is not allowed in outputs
          # we have to disable that so repo output will work
          mask-aws-account-id: false

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Private AI Registry
        run: docker login -u ${{ secrets.PRODUCTION_PRIVATE_AI_DOCKER_USER }} -p ${{ secrets.PRODUCTION_PRIVATE_AI_DOCKER_PASSWORD }} crprivateaiprod.azurecr.io

      - name: Build and Push proxy-service Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./hrm-domain/speech-to-text/proxy-service
          file: ./hrm-domain/speech-to-text/proxy-service/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PROXY }}:live,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PROXY }}:latest,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PROXY }}:${{ inputs.environment }}-speech-to-text-proxy-${{ github.sha }}
          provenance: false

      - name: Build and Push pyannote Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./hrm-domain/speech-to-text/pyannote
          file: ./hrm-domain/speech-to-text/pyannote/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PYANNOTE }}:live,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PYANNOTE }}:latest,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PYANNOTE }}:${{ inputs.environment }}-speech-to-text-pyannote-${{ github.sha }}
          provenance: false

      - name: Build and Push limina Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./hrm-domain/speech-to-text/limina
          file: ./hrm-domain/speech-to-text/limina/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LIMINA }}:live,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LIMINA }}:latest,${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LIMINA }}:${{ inputs.environment }}-speech-to-text-limina-${{ github.sha }}
          provenance: false

      - id: generate-output
        run: |
          echo "proxy_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PROXY }}:${{ inputs.environment }}-speech-to-text-proxy-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "pyannote_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PYANNOTE }}:${{ inputs.environment }}-speech-to-text-pyannote-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "limina_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_LIMINA }}:${{ inputs.environment }}-speech-to-text-limina-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: workflow-scripts-artifacts
          path: .github/workflows/scripts

  deploy_ecs:
    needs: deploy_docker
    name: Deploy to Amazon ECS
    runs-on: ubuntu-latest
    permissions: {}

    env:
      PROXY_IMAGE: ${{ needs.deploy_docker.outputs.proxy_image }}
      PYANNOTE_IMAGE: ${{ needs.deploy_docker.outputs.pyannote_image }}
      LIMINA_IMAGE: ${{ needs.deploy_docker.outputs.limina_image }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.region }}
          # this plugin sets the AWS account ID to a secret which is not allowed in outputs
          # we have to disable that so env.*_IMAGE will work
          mask-aws-account-id: false

      - name: Download current ECS task definition
        run: aws ecs describe-task-definition --task-definition ${{ inputs.environment }}-speech-to-text --query taskDefinition > task-definition.json

      - name: Fill in the proxy image in the Amazon ECS task definition
        id: task-def-proxy
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: proxy
          image: ${{ env.PROXY_IMAGE }}

      - name: Fill in the pyannote image in the Amazon ECS task definition
        id: task-def-pyannote
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-proxy.outputs.task-definition }}
          container-name: pyannote
          image: ${{ env.PYANNOTE_IMAGE }}

      - name: Fill in the limina image in the Amazon ECS task definition
        id: task-def-limina
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-pyannote.outputs.task-definition }}
          container-name: limina
          image: ${{ env.LIMINA_IMAGE }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-limina.outputs.task-definition }}
          service: ${{ inputs.environment }}-speech-to-text
          cluster: ${{ inputs.environment }}-speech-to-text-cluster
          wait-for-service-stability: true

      # reconfigure AWS credentials to use the default region for SSM Parameter Store.
      # aws-actions/configure-aws-credentials@v6 overrides env.AWS_DEFAULT_REGION, so
      # we name our env var PRIMARY_AWS_REGION to avoid that.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.PRIMARY_AWS_REGION }}

      - name: Checkout flex-plugins actions
        uses: actions/checkout@v6
        with:
          repository: techmatters/flex-plugins
          path: flex-plugins
          sparse-checkout: .github/actions

      # Set any env vars needed from Parameter Store here
      - name: Set GITHUB_ACTIONS_SLACK_BOT_TOKEN
        uses: ./flex-plugins/.github/actions/inject-ssm-secrets
        with:
          ssm_parameter: 'GITHUB_ACTIONS_SLACK_BOT_TOKEN'
          env_variable_name: 'GITHUB_ACTIONS_SLACK_BOT_TOKEN'

      - name: Set ASELO_DEPLOYS_CHANNEL_ID
        uses: ./flex-plugins/.github/actions/inject-ssm-secrets
        with:
          ssm_parameter: 'ASELO_DEPLOYS_CHANNEL_ID'
          env_variable_name: 'ASELO_DEPLOYS_CHANNEL_ID'

      # Send Slack notifying success
      - name: Slack Aselo channel
        id: slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ env.GITHUB_ACTIONS_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ env.ASELO_DEPLOYS_CHANNEL_ID }}
            text: '`[HRM Speech-to-Text]` Deployment of ${{ github.ref_type }} `${{ github.ref_name }}` requested by `${{ github.triggering_actor }}` completed with SHA ${{ github.sha }} to region `${{ inputs.region }}`, environment `${{ inputs.environment }}` :rocket:.'
        if: ${{ inputs.send-slack-message != 'false' }}
